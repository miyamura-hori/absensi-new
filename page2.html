<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">

</head>

<body>
    <div class="confetti-container" aria-hidden="true"></div>
    <main class="success-page">
        <section class="success-card" id="successCard">
            <div class="success-icon" id="successIcon">✅</div>
            <h1 id="successTitle">Absensi Berhasil!</h1>
            <p id="successMessage">Terima kasih, data absensi Anda sudah terkirim.</p>
            <div class="success-timer hidden" id="successTimer">
                <div class="timer-label">Durasi Istirahat</div>
                <div class="big-time" id="successElapsed">00:00:00</div>
            </div>
            <a href="index.html" class="success-button">Kembali ke Menu</a>
        </section>
    </main>
    <script>
        const colors = ['#ff6b6b', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'];
        const container = document.querySelector('.confetti-container');
        function createConfetti() {
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('span');
                confetti.className = 'confetti-piece';
                const size = Math.random() * 10 + 8;
                const left = Math.random() * 100;
                const delay = Math.random() * 1.5;
                const duration = Math.random() * 1.2 + 1.8;
                confetti.style.width = `${size}px`;
                confetti.style.height = `${size * 0.4}px`;
                confetti.style.left = `${left}%`;
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = `${delay}s`;
                confetti.style.animationDuration = `${duration}s`;
                container.appendChild(confetti);
                confetti.addEventListener('animationend', () => confetti.remove());
            }
        }

        function getStatusFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('status') || 'Absensi';
        }

        function setSuccessContent(status) {
            const title = document.getElementById('successTitle');
            const message = document.getElementById('successMessage');
            const icon = document.getElementById('successIcon');
            const card = document.getElementById('successCard');

            const map = {
                Absensi: {
                    title: 'Absensi Berhasil!',
                    message: 'Waktu kerja Anda telah dicatat dengan baik.',
                    icon: '✅',
                    className: 'absensi'
                },
                Istirahat: {
                    title: 'Istirahat Tercatat!',
                    message: 'Waktu istirahatmu sudah berhasil disimpan.',
                    icon: '☕',
                    className: 'istirahat'
                },
                Bebas: {
                    title: 'Absensi Bebas!',
                    message: 'Kegiatan bebas Anda sudah tercatat.',
                    icon: '✨',
                    className: 'bebas'
                }
            };

            const statusData = map[status] || map.Absensi;
            title.textContent = statusData.title;
            message.textContent = statusData.message;
            icon.textContent = statusData.icon;
            card.classList.add(statusData.className);
        }

        function formatTime(ms) {
            const s = Math.floor(ms / 1000);
            const hh = String(Math.floor(s / 3600)).padStart(2, '0');
            const mm = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
            const ss = String(s % 60).padStart(2, '0');
            return `${hh}:${mm}:${ss}`;
        }

        function showSuccessTimer(durationMs) {
            const successTimer = document.getElementById('successTimer');
            const successElapsed = document.getElementById('successElapsed');
            if (!successTimer || !successElapsed) return;
            successElapsed.textContent = formatTime(durationMs);
            successTimer.classList.remove('hidden');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const status = getStatusFromUrl();
            setSuccessContent(status);
            if (status === 'Istirahat') {
                const storedDuration = Number(localStorage.getItem('lastIstirahatDuration') || '0');
                showSuccessTimer(storedDuration);
            }
            createConfetti();
            setTimeout(createConfetti, 600);
            setTimeout(createConfetti, 1200);
        });
    </script>
</body>

</html>
