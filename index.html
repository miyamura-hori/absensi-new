<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="icon.png">
</head>

<body>
    <div class="splash">
        <img src="icon.png" alt="">
    </div>


    <div id="loadingOverlay">
        <div style="text-align:center">
            <div class="spinner"></div>
            Mengirim...
        </div>
    </div>

    <section class="main-menu">
        <div class="menu-header">
            <p class="menu-intro">Silakan pilih jenis absensi</p>
            <h1 class="menu-title">Main Menu Absensi</h1>
        </div>
        <div class="menu-grid">
            <button type="button" class="menu-card" data-absensi="Absensi">
                <span class="menu-icon">🟢</span>
                <strong>Absensi</strong>
                <p>Catat waktu kerja.</p>
            </button>
            <button type="button" class="menu-card" data-absensi="Istirahat">
                <span class="menu-icon">☕</span>
                <strong>Istirahat</strong>
                <p>Catat saat break atau istirahat.</p>
            </button>
            <button type="button" class="menu-card" data-absensi="Bebas">
                <span class="menu-icon">✨</span>
                <strong>Bebas</strong>
                <p>Gunakan untuk keperluan lain.</p>
            </button>
        </div>
    </section>

    <form id="absensiForm" class="hidden">
        <div class="selection-summary hidden">
            <span>Pilihan: <strong id="selectedAbsensiName"></strong></span>
            <button type="button" class="change-selection">Ubah pilihan</button>
        </div>
        <h2>📝 Form Absensi</h2>
        <input type="hidden" id="absensiInput" required>

        <label>Absensi:</label>
        <div class="radio-group" id="absensiTypeGroup" style="display:none;">
            <label><input type="radio" name="absensi" value="Masuk" required> Masuk</label>
            <label><input type="radio" name="absensi" value="Pulang"> Pulang</label>
        </div>

        <label>Shift:</label>
        <div class="radio-group">
            <label><input type="radio" name="shift" value="Pagi" required> Pagi</label>
            <label><input type="radio" name="shift" value="Siang"> Siang</label>
            <label><input type="radio" name="shift" value="Split"> Split</label>
            <label><input type="radio" name="shift" value="Lembur"> Lembur</label>
        </div>

        <label for="nama">Nama:</label>
        <select id="nama" name="nama" required>
            <option value="" disabled selected>Pilih Nama</option>
        </select>

        <label>Foto (kamera langsung):</label>
        <video id="videoPreview" autoplay muted playsinline></video>
        <div id="cameraAlert">⚠️ Kamera belum diizinkan. Silakan izinkan akses kamera terlebih dahulu.</div>
        <button type="button" id="btnTakePhoto" onclick="ambilFoto()">📸 Ambil Foto</button>
        <canvas id="canvas" style="display: none;"></canvas>

        <div id="previewContainer">
            <p>📷 Hasil Foto:</p>
            <img id="imagePreview" src="" alt="Preview Foto">
            <div class="btn-group" id="btnGroupFoto">
                <button type="button" onclick="retakeFoto()" id="btnRetake">🔄 Ulangi</button>
                <button type="button" onclick="konfirmasiFoto()" id="btnConfirm">✅ Pakai Foto Ini</button>
            </div>
        </div>

        <input type="hidden" name="foto" id="fotoData">
        <button type="submit">✅ Kirim Absensi</button>
        <footer>Absensi RMK ✨</footer>
    </form>

    <script src="script.js"></script>
</body>

</html>
